steps:
  # 1. Build Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wms-backend:latest'
      - '.'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wms-backend:latest']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wms-backend'
      - '--image=gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,PORT=4000,GCS_BUCKET_NAME=wms-empresa-china-evidencias'

images:
  - 'gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/wms-backend:latest'
