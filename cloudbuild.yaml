steps:
  # 1. Build Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wms-backend:latest'
      - '.'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wms-backend:latest']

  # 3. Deploy Backend to Cloud Run con Cloud SQL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wms-backend'
      - '--image=gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=4000'
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:coorsamexico'
      - '--set-env-vars=NODE_ENV=production,DB_SOCKET_PATH=/cloudsql/$PROJECT_ID:us-central1:coorsamexico,DB_USER=wms_china_user,DB_PASSWORD=WmsCoorsa2026!,DB_NAME=wms-empresa-china,GCS_BUCKET_NAME=wms-empresa-china-evidencias'

images:
  - 'gcr.io/$PROJECT_ID/wms-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/wms-backend:latest'
